{% extends "base.html" %}

{% block title %}Dashboard - ESP32-CAM Surveillance{% endblock %}

{% block extra_styles %}
<style>
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.dashboard-header h2 {
    color: white;
    font-size: 28px;
}

.cameras-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 30px;
}

.camera-card {
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.camera-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.camera-info h3 {
    margin-bottom: 6px;
}

.status-badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}

.status-active {
    background: #d4edda;
    color: #155724;
}

.status-inactive {
    background: #f8d7da;
    color: #721c24;
}

.images-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 15px;
}

.image-container {
    position: relative;
    height: 120px;
    overflow: hidden;
    border-radius: 8px;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.image-timestamp {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 3px 6px;
    font-size: 11px;
    border-radius: 4px;
}

.no-images {
    text-align: center;
    padding: 30px;
    color: #888;
}

.camera-actions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 8px 14px;
    border-radius: 6px;
    text-decoration: none;
    background: #4a69bd;
    color: white;
    border: none;
    cursor: pointer;
}

.btn-danger {
    background: #e55039;
}
</style>
{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h2>📹 Available Cameras</h2>
    <a href="/cameras/new" class="btn">➕ Add Camera</a>
</div>

<div id="cameras-container" class="cameras-grid"></div>
{% endblock %}

{% block extra_scripts %}
<script>
// Format timestamp to HH:MM:SS
function formatTime(timestamp) {
    const date = new Date(timestamp);
    return date.toLocaleTimeString('en-GB');
}

// Handle image loading errors
function handleImageError(imgElement) {
    imgElement.onerror = null; // Prevent infinite loop
    imgElement.src = ''; // Clear the broken image
    imgElement.alt = 'Failed to load';
    
    // Add error message to parent container
    const container = imgElement.closest('.image-container');
    if (container && !container.querySelector('.error-message')) {
        const errorMsg = document.createElement('div');
        errorMsg.className = 'error-message';
        errorMsg.style.cssText = 'color: red; font-size: 10px; text-align: center; margin-top: 5px;';
        errorMsg.textContent = 'Failed to load';
        container.appendChild(errorMsg);
    }
}

async function loadCameraImages(cameraId) {
    try {
        const response = await fetch(`/api/images/${cameraId}?t=${Date.now()}`);
        const data = await response.json();
        return data.images || [];
    } catch (error) {
        console.error("Image load error:", error);
        return [];
    }
}

async function getCameraStatus(cameraId) {
    try {
        const response = await fetch(`/api/camera/${cameraId}/status?t=${Date.now()}`);
        return await response.json();
    } catch (error) {
        console.error("Status error:", error);
        return { status: "inactive", last_seen: "Unknown" };
    }
}

function renderCameraCard(camera, images, status) {
    const statusClass = status.status === "active"
        ? "status-active"
        : "status-inactive";

    const statusText = status.status === "active"
        ? "🟢 Active"
        : "🔴 Inactive";

    let imagesHtml = "";

    if (images.length > 0) {
        imagesHtml += `<div class="images-grid">`;

        images.forEach(img => {
            const imageUrl = img.url + "?t=" + new Date().getTime();

            imagesHtml += `
                <div class="image-container">
                    <a href="${imageUrl}" target="_blank">
                        <img src="${imageUrl}" 
                             alt="Camera Image" 
                             onerror="handleImageError(this)"
                             loading="lazy">
                    </a>
                    <div class="image-timestamp">
                        ${formatTime(img.timestamp)}
                    </div>
                </div>
            `;
        });

        imagesHtml += `</div>`;
    } else {
        imagesHtml = `
            <div class="no-images">
                ${status.status === "active"
                    ? "📸 Waiting for ESP32 upload..."
                    : "📴 Camera Offline"}
            </div>
        `;
    }

    return `
        <div class="camera-card">
            <div class="camera-header">
                <div class="camera-info">
                    <h3>${camera.name}</h3>
                    <p>🏷️ ${camera.camera_id}</p>
                    <p>🕐 Last Seen: ${status.last_seen}</p>
                </div>
                <span class="status-badge ${statusClass}">
                    ${statusText}
                </span>
            </div>

            ${imagesHtml}

            <div class="camera-actions">
                <button onclick="loadAllCameras()" class="btn">🔄 Refresh</button>
                <button onclick="deleteCamera('${camera.camera_id}')" class="btn btn-danger">🗑 Delete</button>
            </div>
        </div>
    `;
}

async function loadAllCameras() {
    const container = document.getElementById("cameras-container");
    container.innerHTML = '<div style="text-align: center; color: white;">Loading cameras...</div>';

    try {
        const cameras = {{ cameras | tojson }};

        if (!cameras || cameras.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: white;">No cameras found. Add one to get started!</div>';
            return;
        }

        let html = '';
        
        for (const camera of cameras) {
            const [images, status] = await Promise.all([
                loadCameraImages(camera.camera_id),
                getCameraStatus(camera.camera_id)
            ]);

            html += renderCameraCard(camera, images, status);
        }
        
        container.innerHTML = html;
    } catch (error) {
        console.error("Error loading cameras:", error);
        container.innerHTML = '<div style="text-align: center; color: white;">Error loading cameras. Please refresh.</div>';
    }
}

async function deleteCamera(cameraId) {
    if (!confirm("Are you sure you want to delete this camera?")) return;

    const form = document.createElement("form");
    form.method = "POST";
    form.action = `/cameras/${cameraId}/delete`;
    document.body.appendChild(form);
    form.submit();
}

// Initial load
document.addEventListener("DOMContentLoaded", loadAllCameras);

// Auto refresh every 15 seconds
setInterval(loadAllCameras, 15000);

</script>
{% endblock %}
