{% extends "base.html" %}

{% block title %}Dashboard - ESP32-CAM Surveillance{% endblock %}

{% block extra_styles %}
<style>
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.dashboard-header h2 {
    color: white;
    font-size: 28px;
}

.cameras-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 30px;
}

.camera-card {
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.camera-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.camera-info h3 {
    margin-bottom: 6px;
}

.status-badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}

.status-active {
    background: #d4edda;
    color: #155724;
}

.status-inactive {
    background: #f8d7da;
    color: #721c24;
}

.images-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 15px;
}

.image-container {
    position: relative;
    height: 120px;
    overflow: hidden;
    border-radius: 8px;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.image-timestamp {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 3px 6px;
    font-size: 11px;
    border-radius: 4px;
}

.no-images {
    text-align: center;
    padding: 30px;
    color: #888;
}

.camera-actions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 8px 14px;
    border-radius: 6px;
    text-decoration: none;
    background: #4a69bd;
    color: white;
    border: none;
    cursor: pointer;
}

.btn-danger {
    background: #e55039;
}
</style>
{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h2>📹 Available Cameras</h2>
    <a href="/cameras/new" class="btn">➕ Add Camera</a>
</div>

<div id="cameras-container" class="cameras-grid"></div>
{% endblock %}

{% block extra_scripts %}
<script>

function formatTime(timestamp) {
    const date = new Date(timestamp);
    return date.toLocaleTimeString('en-GB');
}

async function loadCameraImages(cameraId) {
    try {
        const response = await fetch(`/api/images/${cameraId}?t=${Date.now()}`);
        const data = await response.json();
        return data.images || [];
    } catch (error) {
        console.error("Image load error:", error);
        return [];
    }
}

async function getCameraStatus(cameraId) {
    try {
        const response = await fetch(`/api/camera/${cameraId}/status?t=${Date.now()}`);
        return await response.json();
    } catch (error) {
        return { status: "inactive", last_seen: "Unknown" };
    }
}

function renderCameraCard(camera, images, status) {

    const statusClass = status.status === "active"
        ? "status-active"
        : "status-inactive";

    const statusText = status.status === "active"
        ? "🟢 Active"
        : "🔴 Inactive";

    let imagesHtml = "";

    if (images.length > 0) {
        imagesHtml += `<div class="images-grid">`;

        images.forEach(img => {
            const imageUrl = img.url + "?t=" + new Date().getTime();

            imagesHtml += `
                <div class="image-container">
                    <a href="${imageUrl}" target="_blank">
                        <img src="${imageUrl}" alt="Camera Image">
                    </a>
                    <div class="image-timestamp">
                        ${formatTime(img.timestamp)}
                    </div>
                </div>
            `;
        });

        imagesHtml += `</div>`;
    } else {
        imagesHtml = `
            <div class="no-images">
                ${status.status === "active"
                    ? "📸 Waiting for ESP32 upload..."
                    : "📴 Camera Offline"}
            </div>
        `;
    }

    return `
        <div class="camera-card">
            <div class="camera-header">
                <div class="camera-info">
                    <h3>${camera.name}</h3>
                    <p>🏷️ ${camera.camera_id}</p>
                    <p>🕐 Last Seen: ${status.last_seen}</p>
                </div>
                <span class="status-badge ${statusClass}">
                    ${statusText}
                </span>
            </div>

            ${imagesHtml}

            <div class="camera-actions">
                <button onclick="loadAllCameras()" class="btn">🔄 Refresh</button>
                <button onclick="deleteCamera('${camera.camera_id}')" class="btn btn-danger">🗑 Delete</button>
            </div>
        </div>
    `;
}

async function loadAllCameras() {

    const container = document.getElementById("cameras-container");
    container.innerHTML = "";

    const cameras = {{ cameras | tojson }};

    for (const camera of cameras) {

        const [images, status] = await Promise.all([
            loadCameraImages(camera.camera_id),
            getCameraStatus(camera.camera_id)
        ]);

        container.insertAdjacentHTML(
            "beforeend",
            renderCameraCard(camera, images, status)
        );
    }
}

async function deleteCamera(cameraId) {
    if (!confirm("Delete this camera?")) return;

    const form = document.createElement("form");
    form.method = "POST";
    form.action = `/cameras/${cameraId}/delete`;
    document.body.appendChild(form);
    form.submit();
}

document.addEventListener("DOMContentLoaded", loadAllCameras);

// Auto refresh every 10 seconds
setInterval(loadAllCameras, 10000);

</script>
{% endblock %}
